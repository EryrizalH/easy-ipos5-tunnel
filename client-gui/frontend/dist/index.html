<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Rathole Client</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Easy Rathole Client</h1>
        <p>Windows GUI monitor + service control</p>
      </header>

      <section class="grid">
        <article class="card">
          <h2>Connection</h2>
          <p id="connectionState" class="value">-</p>
          <small id="lastChecked">Last checked: -</small>
        </article>
        <article class="card">
          <h2>Client Service</h2>
          <p id="serviceState" class="value">-</p>
          <small id="serviceName">EasyRatholeClient</small>
        </article>
        <article class="card">
          <h2>Server Public IP</h2>
          <p id="serverPublicIP" class="value">-</p>
          <small id="serverHost">Host: -</small>
        </article>
        <article class="card">
          <h2>Server Status</h2>
          <p id="dashboardStatus" class="value">Dashboard: -</p>
          <small id="controlStatus">Control Port: -</small>
        </article>
      </section>

      <section class="panel">
        <h3>Service Control</h3>
        <div class="actions">
          <button id="btnStart">Start</button>
          <button id="btnStop">Stop</button>
          <button id="btnRestart">Restart</button>
          <button id="btnRefresh">Refresh</button>
        </div>
      </section>

      <section class="panel">
        <h3>Settings</h3>
        <label for="configPath">client.toml path</label>
        <div class="row">
          <input id="configPath" type="text" />
          <button id="btnSaveConfig">Save</button>
        </div>
        <div class="row">
          <button id="btnEnableAutostart">Enable Auto-Start</button>
          <button id="btnDisableAutostart">Disable Auto-Start</button>
        </div>
      </section>

      <section class="panel">
        <h3>Messages</h3>
        <p id="message" class="message">Ready.</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
